name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm test
      - run: pnpm run typecheck:packages
      - run: pnpm run test:packages
      - run: pnpm run build
      # Smoke-test the built package so src/dist drift is caught in CI
      - name: Smoke test dist
        run: node --input-type=module <<'EOF'
          import { StateGraph, START, END, lastValue } from "./dist/index.js";
          const g = new StateGraph({ channels: { v: lastValue(() => 0) } });
          g.addNode("n", async () => ({ v: 1 }));
          g.addEdge(START, "n");
          g.addEdge("n", END);
          const result = await g.compile().invoke({});
          if (result.v !== 1) throw new Error("smoke test failed: got " + result.v);
          console.log("dist smoke test passed");
        EOF

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      - name: Strict typecheck
        run: npx tsc --noEmit -p tsconfig.strict.json
